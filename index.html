<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Capture Chatbot</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
  }

  #chat {
    max-width: 420px;
    margin: 30px auto;
    padding: 15px;
    background: #1e293b;
    border-radius: 15px;
    height: 500px;
    overflow-y: auto;
  }

  .msg {
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
    max-width: 75%;
  }

  .bot { background: #334155; }
  .user {
    background: #2563eb;
    margin-left: auto;
    text-align: right;
  }

  #inputBox {
    display: flex;
    max-width: 420px;
    margin: auto;
  }

  input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
  }

  button {
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
  }

  .options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 10px;
  }

  .option-btn {
    background: #475569;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type here..." />
  <button onclick="send()">Send</button>
</div>

<script>
const CONFIG = {
  webhookURL: "PASTE_YOUR_WEBHOOK_URL_HERE"
};

// ================= STATE =================
let step = -1;
let data = {};

// ================= HELPERS =================
function addMsg(text, cls) {
  document.getElementById("chat").innerHTML += `<div class="msg ${cls}">${text}</div>`;
  scroll();
}

function addOptions(options) {
  let html = '<div class="options">';
  options.forEach(opt => {
    html += `<div class="option-btn" onclick="selectOption('${opt}')">${opt}</div>`;
  });
  html += '</div>';
  document.getElementById("chat").innerHTML += html;
  scroll();
}

function selectOption(value) {
  document.getElementById("input").value = value;
  send();
}

function scroll() {
  let chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

function botReply(text, options = null) {
  addMsg("Typing...", "bot");

  setTimeout(() => {
    document.querySelector(".bot:last-child").remove();
    addMsg(text, "bot");
    if (options) addOptions(options);
  }, 400);
}

// ================= VALIDATION =================
function validName(name) {
  return /^[a-zA-Z ]{2,}$/.test(name);
}

function validPhone(phone) {
  return /^[+]?[0-9]{9,15}$/.test(phone);
}

function validEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// ================= MAIN FLOW =================
function send() {
  let input = document.getElementById("input").value.trim();
  if (!input) return;

  addMsg(input, "user");
  document.getElementById("input").value = "";

  if (step === -1) {
    data.intent = input;
    step++;
    botReply("What are you looking for?", ["Rent", "Buy", "Just exploring"]);
    return;
  }

  if (step === 0) {
    botReply("What’s your name?");
    step++;
    return;
  }

  if (step === 1) {
    if (!validName(input)) {
      botReply("Enter a valid name.");
      return;
    }
    data.name = input;
    step++;
    botReply("Your phone number?");
    return;
  }

  if (step === 2) {
    if (!validPhone(input)) {
      botReply("Enter a valid number.");
      return;
    }
    data.phone = input;
    step++;
    botReply("What type?", ["Apartment", "House", "Room"]);
    return;
  }

  if (step === 3) {
    data.requirement = input;
    step++;
    botReply("Your email? (type 'skip' if none)");
    return;
  }

  if (step === 4) {
    if (input.toLowerCase() !== "skip" && !validEmail(input)) {
      botReply("Invalid email or type 'skip'.");
      return;
    }
    data.email = input === "skip" ? "" : input;
    step++;
    botReply("When should we contact you?");
    return;
  }

  if (step === 5) {
    data.date = input;

    fetch(CONFIG.webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    })
    .then(() => botReply("Done! Your info is submitted ✅"))
    .catch(() => botReply("Submitted (maybe). Check your sheet."));

    step++;
    return;
  }
}

// ================= INIT =================
setTimeout(() => {
  botReply("Hi 👋 I can help capture leads for you.", ["Start"]);
}, 500);
</script>

</body>
</html>
